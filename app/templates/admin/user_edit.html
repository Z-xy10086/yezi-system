{% extends 'base.html' %}

{% block title %}{{ '添加用户' if action == 'add' else '编辑用户' }} - 农作物叶片病斑检测系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-sm-12">
        <div class="card">
            <div class="card-header {% if action == 'add' %}bg-success{% else %}bg-primary{% endif %} text-white">
                <h3><i class="fas {% if action == 'add' %}fa-user-plus{% else %}fa-user-edit{% endif %}"></i> 
                    {{ '添加用户' if action == 'add' else '编辑用户' }}
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" 
                               value="{{ user.username if user else '' }}" placeholder="请输入用户名" required>
                    </div>
                    
                    {% if action == 'add' %}
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="请输入密码（至少6位）" required>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label for="password" class="form-label">密码（留空则不修改）</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="留空则不修改密码">
                    </div>
                    {% endif %}
                    
                    <div class="mb-3">
                        <label for="role" class="form-label">角色</label>
                        <select class="form-select" id="role" name="role">
                            <option value="farmer" {% if user and user.role == 'farmer' %}selected{% endif %}>农户</option>
                            <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>管理员</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">手机号（选填）</label>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               value="{{ user.phone if user else '' }}" placeholder="请输入手机号">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱（选填）</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ user.email if user else '' }}" placeholder="请输入邮箱">
                    </div>
                    
                    <button type="submit" class="btn {% if action == 'add' %}btn-success{% else %}btn-primary{% endif %} w-100 btn-lg">
                        <i class="fas {% if action == 'add' %}fa-user-plus{% else %}fa-save{% endif %}"></i> 
                        {{ '添加用户' if action == 'add' else '保存修改' }}
                    </button>
                    
                    <a href="{{ url_for('admin.users') }}" class="btn btn-secondary w-100 mt-3">
                        <i class="fas fa-arrow-left"></i> 返回列表
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
