{% extends 'base.html' %}

{% block title %}上传检测 - 农作物叶片病斑检测系统{% endblock %}

{% block content %}
<div class="card-custom">
    <div class="card-header-custom">
        <i class="fas fa-cloud-upload-alt"></i> 上传叶片图片
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data" id="upload-form">
            <div class="row">
                <div class="col-lg-6">
                    <div class="form-group">
                        <label for="file">选择图片</label>
                        <input type="file" id="file" name="file" accept="image/*" class="form-control-custom" required>
                        <small class="text-muted">支持 JPG、PNG 格式，最大 10MB</small>
                    </div>
                    
                    {% if preview %}
                    <div class="mt-4">
                        <label>图片预览</label>
                        <div class="card-custom p-2">
                            <img src="{{ preview }}" class="img-fluid rounded" alt="预览">
                        </div>
                    </div>
                    {% endif %}
                </div>
                
                <div class="col-lg-6">
                    <div class="card-custom p-4 h-100">
                        <h5 class="font-weight-bold mb-4">检测说明</h5>
                        <ul class="list-unstyled">
                            <li class="mb-3">
                                <i class="fas fa-check-circle text-success mr-2"></i>
                                上传清晰的叶片照片
                            </li>
                            <li class="mb-3">
                                <i class="fas fa-check-circle text-success mr-2"></i>
                                确保叶片完整出现在画面中
                            </li>
                            <li class="mb-3">
                                <i class="fas fa-check-circle text-success mr-2"></i>
                                避免光线过强或过暗
                            </li>
                            <li class="mb-3">
                                <i class="fas fa-check-circle text-success mr-2"></i>
                                背景尽量简洁
                            </li>
                        </ul>
                        <hr>
                        <h5 class="font-weight-bold mb-3">检测流程</h5>
                        <ol>
                            <li class="mb-2">上传图片</li>
                            <li class="mb-2">系统自动分割叶片区域</li>
                            <li class="mb-2">识别病斑并计算占比</li>
                            <li class="mb-2">生成检测报告和防治建议</li>
                        </ol>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 text-center">
                <button type="submit" class="btn btn-custom btn-lg">
                    <i class="fas fa-search"></i> 开始检测
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.getElementById('file');
        const uploadForm = document.getElementById('upload-form');
        
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewDiv = document.querySelector('.mt-4');
                    if (previewDiv) {
                        previewDiv.querySelector('img').src = e.target.result;
                    }
                };
                reader.readAsDataURL(this.files[0]);
            }
        });
        
        uploadForm.addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
            btn.disabled = true;
        });
    });
</script>
{% endblock %}
